name: 国民の祝日データを更新

on:
  schedule:
    # 毎月2日 03:15（日本時間）に内閣府CSVの更新を確認
    - cron: "15 18 1 * *"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
      - run: node scripts/update-holidays.mjs
      - name: 更新があれば反映
        run: |
          if git diff --quiet -- JS/holidays-data.js; then
            exit 0
          fi
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add JS/holidays-data.js
          git commit -m "chore: update national holidays"
          git push
